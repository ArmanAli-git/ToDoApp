<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDo</title>
    <link href="./style.css" rel="stylesheet" />
  </head>
  <body>
    <header>
      <h1 id="title">TODO App</h1>
      <input type="checkbox" class="dark-mode-checkbox" />
    </header>

    <main>
      <div class="work-todo-container">
        <div class="work-todo" id="one">
          <label for="checkbox-1" class="todo-checkbox-label">
            <input
              type="checkbox"
              class="todo-checkbox"
              id="checkbox-1"
              onchange="checkToDo(this, 'one')"
            />
            <svg viewBox="0 -960 960 960">
              <path d="M382-240 154-468l57-57 171 171 367-367 57 57-424 424Z" />
            </svg>
          </label>
          <label class="todo-info" onclick="viewToDo('1')">
            This is a work 1
          </label>
          <button class="todo-edit-button" onclick="editToDo()">
            <svg viewBox="0 -960 960 960">
              <path
                d="M200-200h57l391-391-57-57-391 391v57Zm-80 80v-170l528-527q12-11 26.5-17t30.5-6q16 0 31 6t26 18l55 56q12 11 17.5 26t5.5 30q0 16-5.5 30.5T817-647L290-120H120Zm640-584-56-56 56 56Zm-141 85-28-29 57 57-29-28Z"
              />
            </svg>
          </button>
          <button class="todo-delete-button" onclick="deleteToDo()">
            <svg viewBox="0 -960 960 960">
              <path
                d="m376-300 104-104 104 104 56-56-104-104 104-104-56-56-104 104-104-104-56 56 104 104-104 104 56 56Zm-96 180q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520Zm-400 0v520-520Z"
              />
            </svg>
          </button>
        </div>

        <button class="add-button" onclick="showAddWork()">
          <svg viewBox="0 -960 960 960">
            <path
              d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"
            />
          </svg>
        </button>
      </div>

      <div class="add-work-background">
        <div class="add-work-container">
          <div class="work-info-container">
            <input id="work-info-title" placeholder="Title" />
            <textarea
              id="work-info-description"
              placeholder="Description"
              rows="6"
            ></textarea>
          </div>

          <div class="work-button-container">
            <button class="work-edit-button" onclick="editToDo()">
              <svg viewBox="0 -960 960 960">
                <path
                  d="M200-200h57l391-391-57-57-391 391v57Zm-80 80v-170l528-527q12-11 26.5-17t30.5-6q16 0 31 6t26 18l55 56q12 11 17.5 26t5.5 30q0 16-5.5 30.5T817-647L290-120H120Zm640-584-56-56 56 56Zm-141 85-28-29 57 57-29-28Z"
                />
              </svg>
            </button>
            <button class="work-save-button" onclick="saveToDo()">
              <svg viewBox="0 -960 960 960">
                <path
                  d="M840-680v480q0 33-23.5 56.5T760-120H200q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h480l160 160Zm-80 34L646-760H200v560h560v-446ZM565-275q35-35 35-85t-35-85q-35-35-85-35t-85 35q-35 35-35 85t35 85q35 35 85 35t85-35ZM240-560h360v-160H240v160Zm-40-86v446-560 114Z"
                />
              </svg>
            </button>
            <button class="work-delete-button" onclick="deleteToDo()">
              <svg viewBox="0 -960 960 960">
                <path
                  d="m376-300 104-104 104 104 56-56-104-104 104-104-56-56-104 104-104-104-56 56 104 104-104 104 56 56Zm-96 180q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520Zm-400 0v520-520Z"
                />
              </svg>
            </button>
            <button class="work-add-button" onclick="addWork()">Add</button>
            <button class="work-cancel-button" onclick="cancelAddWork()">
              Cancel
            </button>
          </div>
        </div>
      </div>
    </main>

    <footer></footer>
    <script src="./script.js"></script>
  </body>
</html>
